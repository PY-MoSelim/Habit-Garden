
{% extends "base.html" %}
{% block title %}Login — Habit Garden{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🌿</div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Your garden is waiting for you.</p>
    </div>

    <form class="auth-form" method="POST" action="{{ url_for('main.login') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-input"
               placeholder="Your username" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-input"
               placeholder="Your password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Enter Garden</button>
    </form>

    <p class="auth-switch">
      Don't have an account?
      <a href="{{ url_for('main.register') }}">Plant your first seed</a>
    </p>
  </div>
  <div class="auth-deco auth-deco-left">🌵</div>
  <div class="auth-deco auth-deco-right">🌸</div>
</div>
{% endblock %}
